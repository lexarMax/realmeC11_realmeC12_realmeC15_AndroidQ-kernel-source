name: Build Kernel NetHunter C11 & C15 (Ultimate Auto-Load & Firmware Pack)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Set Up Python 2.7 & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev glibc-source libcap-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu zip git wget python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Inject Driver Pihak Ketiga TL-WN725N v3 (RTL8188EUS)
      run: |
        cd drivers/net/wireless/
        git clone https://github.com/aircrack-ng/rtl8188eus.git --depth=1
        echo 'source "drivers/net/wireless/rtl8188eus/Kconfig"' >> Kconfig
        echo 'obj-$(CONFIG_RTL8188EUS) += rtl8188eus/' >> Makefile

    - name: Download Firmware Master List (Untuk Disuntikkan ke ZIP)
      run: |
        mkdir -p firmware_pack
        cd firmware_pack
        # Mengunduh 3 berkas firmware resmi untuk kebutuhan runtime di HP Realme
        wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/htc_9271.fw
        wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/rtlwifi/rtl8188eufw.bin
        wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/mediatek/mt7601u.bin

    - name: Patch MediaTek TRNG (Bypass Makefile Error)
      run: |
        sed -i '/obj-y += trng\//d' drivers/misc/mediatek/Makefile

    - name: Configure Kernel Defconfig & Inject NetHunter Multi-Driver Features
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        make O=out oppo6765_defconfig
        
        # --- CORE WIRELESS STACK (MONOLITIK) ---
        echo "CONFIG_WIRELESS=y" >> out/.config
        echo "CONFIG_CFG80211=y" >> out/.config
        echo "CONFIG_MAC80211=y" >> out/.config
        echo "CONFIG_WLAN=y" >> out/.config
        echo "CONFIG_NET=y" >> out/.config
        
        # --- DRIVER ADAPTER (MODUL DINAMIS =m UNTUK AUTO-LOAD) ---
        echo "CONFIG_ATH_COMMON=m" >> out/.config
        echo "CONFIG_ATH_CARDS=m" >> out/.config
        echo "CONFIG_ATH9K_HW=m" >> out/.config
        echo "CONFIG_ATH9K_COMMON=m" >> out/.config
        echo "CONFIG_ATH9K_BTCX=y" >> out/.config
        echo "CONFIG_ATH9K_HTC=m" >> out/.config
        echo "CONFIG_ATH9K_HTC_DEBUGFS=y" >> out/.config
        echo "CONFIG_RTL8188EUS=m" >> out/.config
        echo "CONFIG_88EU_AP_MODE=y" >> out/.config
        echo "CONFIG_88EU_MONITOR_MODE=y" >> out/.config
        echo "CONFIG_CONCURRENT_MODE=y" >> out/.config
        echo "CONFIG_MT7601U=m" >> out/.config
        
        # --- OPTIMASI INJECTION & REGULASI DAYA PANCAR ---
        echo "CONFIG_CFG80211_WEXT=y" >> out/.config
        echo "CONFIG_CFG80211_REQUIRE_SIGNED_REGDB=n" >> out/.config
        echo "CONFIG_CFG80211_CRDA_SUPPORT=y" >> out/.config
        echo "CONFIG_MAC80211_RC_MINSTREL=y" >> out/.config
        echo "CONFIG_MAC80211_RC_MINSTREL_HT=y" >> out/.config
        echo "CONFIG_MAC80211_RC_DEFAULT_MINSTREL=y" >> out/.config
        echo "CONFIG_MAC80211_LEDS=y" >> out/.config
        echo "CONFIG_MAC80211_DEBUGFS=y" >> out/.config
        echo "CONFIG_MAC80211_MESH=y" >> out/.config
        echo "CONFIG_USB_SUPPORT=y" >> out/.config
        echo "CONFIG_USB_NET_DRIVERS=y" >> out/.config
        echo "CONFIG_USB_USBNET=y" >> out/.config
        echo "CONFIG_USB_NET_CDCETHER=y" >> out/.config
        
        # --- NETFILTER ROUTING TINGKAT LANJUT (FLUXION / AIRGEDDON) ---
        echo "CONFIG_BPF_SYSCALL=y" >> out/.config
        echo "CONFIG_BRIDGE=y" >> out/.config
        echo "CONFIG_NETFILTER=y" >> out/.config
        echo "CONFIG_NETFILTER_XT_TARGET_REDIRECT=y" >> out/.config
        echo "CONFIG_NETFILTER_XT_MATCH_COMMENT=y" >> out/.config
        echo "CONFIG_IP_NF_IPTABLES=y" >> out/.config
        echo "CONFIG_IP_NF_FILTER=y" >> out/.config
        echo "CONFIG_IP_NF_TARGET_REJECT=y" >> out/.config
        echo "CONFIG_IP_NF_MANGLE=y" >> out/.config
        echo "CONFIG_IP_NF_NAT=y" >> out/.config
        
        # NONAKTIFKAN METODE LAMA AGAR TIDAK MEMICU KEPANIKAN KERNEL
        echo 'CONFIG_FIRMWARE_IN_KERNEL=n' >> out/.config
        
        make O=out oldconfig

    - name: Compile Kernel Image.gz-dtb & Modules
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export KCFLAGS="-w -fno-pic -fno-strict-aliasing"
        export CFLAGS_MODULE="-w"
        make O=out -j$(nproc --all) Image.gz-dtb modules

    - name: Package Kernel with Git-Cloned Verified AnyKernel Framework
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel
        rm -f AnyKernel/README.md AnyKernel/anykernel.sh AnyKernel/tools/ak3-core.sh
        
        # 1. Konfigurasi anykernel.sh dengan mendeteksi modul & firmware otomatis
        cat << 'EOF' > AnyKernel/anykernel.sh
        # AnyKernel3 Ramdisk Mod Script
        # osm0sis @ xda-developers

        ## AnyKernel setup
        properties() { '
        kernel.string=NetHunter Pack Auto-Load (C11/C15)
        do.devicecheck=1
        do.modules=1
        do.systemless=1
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=RMX2185
        device.name2=RMX2189
        device.name3=RMX2180
        device.name4=oppo6765
        '; }

        block=/dev/block/by-name/boot;
        is_slot_device=0;
        ramdisk_compression=auto;

        . tools/ak3-core.sh;

        split_boot;
        flash_boot;
        EOF

        # 2. Tulis ulang tools/ak3-core.sh versi modifikasi direct bypass MediaTek
        cat << 'EOF' > AnyKernel/tools/ak3-core.sh
        OUTFD=$1;
        test "$home" || home=$PWD;
        bootimg=$home/boot.img;
        bin=$home/tools;
        split_img=$home/split_img;

        ui_print() { until [ ! "$1" ]; do echo -e "ui_print $1\nui_print" > /proc/self/fd/$OUTFD; shift; done; }
        abort() { ui_print " " "$@"; exit 1; }

        split_boot() {
          if [ ! -e "$block" ]; then block=/dev/block/by-name/boot; fi;
          dd if=$block of=$bootimg bs=1048576 count=64 2>/dev/null;
          mkdir -p $split_img;
          cd $split_img;
          $bin/magiskboot unpack -h $bootimg 2>/dev/null || true;
          cd $home;
        }

        flash_boot() {
          cd $split_img;
          if [ -f $home/Image.gz-dtb ]; then
            cp -f $home/Image.gz-dtb kernel;
          fi;
          $bin/magiskboot repack $bootimg $home/boot-new.img 2>/dev/null || true;
          
          cd $home;
          if [ -f boot-new.img ]; then
            dd if=boot-new.img of=$block bs=1048576 2>/dev/null;
            ui_print "-> Penyuntikan Kernel Auto-Load Sukses!";
          else
            dd if=$home/Image.gz-dtb of=$block bs=1048576 2>/dev/null;
            ui_print "-> Fallback Direct Flashing Berhasil!";
          fi;
        }
        EOF

        chmod 755 AnyKernel/anykernel.sh
        chmod -R 755 AnyKernel/tools/

        cp out/arch/arm64/boot/Image.gz-dtb AnyKernel/
        echo "NetHunter Ultimate Pack Kernel" > AnyKernel/banner
        
        # --- 1. PROSES OTOMATISASI: SUNTIK MODUL DRIVER (.ko) ---
        mkdir -p AnyKernel/modules/vendor/lib/modules
        find out/ -name "*.ko" -exec cp {} AnyKernel/modules/vendor/lib/modules/ \;
        
        # --- 2. PROSES OTOMATISASI: SUNTIK BINARY FIRMWARE (.fw / .bin) ---
        # Membuat folder bayangan di AnyKernel agar TWRP otomatis menyalin berkas firmware fisik ke partisi vendor HP Realme Anda saat di-flash!
        mkdir -p AnyKernel/modules/vendor/firmware/mediatek
        cp firmware_pack/htc_9271.fw AnyKernel/modules/vendor/firmware/
        cp firmware_pack/rtl8188eufw.bin AnyKernel/modules/vendor/firmware/
        cp firmware_pack/mt7601u.bin AnyKernel/modules/vendor/firmware/mediatek/
        
        cd AnyKernel
        zip -r9 ../NetHunter-C11-C15-UltimatePack.zip *

    - name: Upload Flashable AnyKernel3 ZIP to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-UltimatePack-ZIP
        path: NetHunter-C11-C15-UltimatePack.zip
